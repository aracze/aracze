services:
  payload:
    image: node:22-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /home/node/app/
    command: sh -c "apk add --no-cache docker-cli docker-compose && corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:yourpassword@postgres:5432/aracze

  postgres:
    restart: always
    # Stejná verze jako produkce (deploy/docker-compose.yml). Migrace ze staré
    # Debian (glibc) na Alpine (musl) proběhla přes dump/restore, který přebuduje
    # indexy se správným řazením — proto se image nesmí jen přehodit pod starým
    # volume (collation nesoulad), ale naplnit čerstvý volume z dumpu.
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: aracze
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'

volumes:
  pgdata:
  node_modules:
