services:
  payload:
    image: node:24-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /home/node/app/
    # corepack bez `prepare pnpm@latest` — verzi pnpm určuje pole `packageManager`
    # v package.json, aby kontejner používal stejnou verzi jako lockfile.
    command: sh -c "apk add --no-cache docker-cli docker-compose && corepack enable && pnpm install && pnpm dev"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:yourpassword@postgres:5432/aracze

  postgres:
    restart: always
    # Stejná verze jako produkce (deploy/docker-compose.yml). Debian (glibc) místo
    # Alpine (musl): výchozí/nejlépe podporovaná varianta oficiálního image, robustnější
    # locale. POZOR: image nejde jen přehodit pod starým volume (nesoulad collation
    # musl↔glibc) — nutný čerstvý volume + restore z dumpu (přebuduje indexy pod glibc).
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: aracze
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'

volumes:
  pgdata:
  node_modules:
