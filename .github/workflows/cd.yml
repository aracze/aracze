name: CD

# Sestaví Docker obraz CMS (Payload), nahraje ho do GitHub Container Registry
# (ghcr.io) a poté se přihlásí na server a nasadí novou verzi.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # umožní ruční spuštění z webu GitHubu

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Přihlášení do ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata obrazu (tagy)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build a push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* se zapékají do klientského bundlu při buildu (ne za běhu),
          # proto je předáváme sem z GitHub Variables (Settings → Variables).
          # Prázdné (nenastavené, např. AdSense) se předají jako prázdný řetězec.
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_PAYLOAD_BASE_URL=${{ vars.NEXT_PUBLIC_PAYLOAD_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
            NEXT_PUBLIC_ADSENSE_CLIENT=${{ vars.NEXT_PUBLIC_ADSENSE_CLIENT }}
            NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT=${{ vars.NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT }}
            NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT_2=${{ vars.NEXT_PUBLIC_ADSENSE_ARTICLE_SLOT_2 }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Nasazení na server přes SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/aracze
            docker compose pull cms
            docker compose up -d cms
            docker image prune -f
