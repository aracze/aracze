# Produkční nasazení projektu aracze na server (IONOS VPS).
# Obrazy se NEbuildují zde — stahují se hotové z GitHub Container Registry
# (ghcr.io), sestavené v GitHub Actions. Server je jen spouští.
#
# Umístění na serveru: /opt/aracze/docker-compose.yml (+ /opt/aracze/.env)
# Nasazení: docker compose pull && docker compose up -d

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Debian (glibc) + ICU cs-CZ collation (české řazení). Uplatní se jen při initdb
      # na čerstvém volume. Migrace z Alpine proběhla přes dump/restore (2026-07-19).
      POSTGRES_INITDB_ARGS: '--locale-provider=icu --icu-locale=cs-CZ --locale=en_US.utf8'
    volumes:
      # PostgreSQL 18+ image ukládá data do podadresáře; mount patří na
      # /var/lib/postgresql (ne /…/data jako u <=17). Nový volume pgdata_debian —
      # starý pgdata (Alpine/musl) zůstal na serveru jako rollback (smazat po ověření).
      - pgdata_debian:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Databáze není vystavená ven — přístup jen z ostatních kontejnerů.

  cms:
    image: ghcr.io/aracze/aracze:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # Cloudflare R2 (S3-kompatibilní) – ZÁLOHA médií. Cloudinary zůstává hlavní
      # úložiště; hook v Media.ts po nahrání zkopíruje obrázek i do R2. Bez těchto
      # proměnných záloha spadne (r2BackupStatus='error'). Hodnoty do /opt/aracze/.env.
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET: ${S3_SECRET}
      # NEXT_PUBLIC_* (vč. base URL pro absolutní adresy obrázků) se do image
      # zapékají při buildu (viz cd.yml), za běhu tu proto nejsou.
      # SMTP (odesílání e-mailů z administrace – reset hesla). Běhové proměnné,
      # ne build-time – hodnoty doplň do /opt/aracze/.env. Bez SMTP_HOST se
      # e-maily jen vypíšou do logu (žádné odesílání).
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    ports:
      # Sloučená appka (veřejný web i /admin) běží na portu 80 (http://<IP>/)
      - '80:3000'

volumes:
  pgdata: # starý Alpine/musl volume — ponechán jako rollback po migraci, smazat po ověření
  pgdata_debian:
